<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - {{ data.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Audiowide&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div id="cursor-trail"></div>
    
    <!-- Dummy Boot Sequence (hidden, just for JS initialization) -->
    <div id="boot-sequence" class="boot-overlay" style="display: none;">
        <div class="boot-content">
            <div class="terminal-window">
                <div class="terminal-header">
                    <span class="terminal-button red"></span>
                    <span class="terminal-button yellow"></span>
                    <span class="terminal-button green"></span>
                    <span class="terminal-title">CALCULATION ENGINE v3.14</span>
                </div>
                <div class="terminal-body">
                    <div id="boot-text"></div>
                </div>
            </div>
        </div>
    </div>
    
    <nav class="cyber-nav fixed-top">
        <div class="container">
            <div class="nav-content">
                <div class="nav-brand">
                    <span class="glitch-text" data-text="{{ data.name }}">{{ data.name }}</span>
                    <button class="theme-toggle mobile-theme-toggle" id="theme-toggle">LIGHT</button>
                </div>
                <div class="nav-links">
                    <a href="/" class="nav-link">HOME</a>
                    <a href="/education" class="nav-link">EDUCATION</a>
                    <a href="/experience" class="nav-link">EXPERIENCE</a>
                    <a href="/skills" class="nav-link">SKILLS</a>
                    <a href="/projects" class="nav-link">PROJECTS</a>
                    <a href="/achievements" class="nav-link">ACHIEVEMENTS</a>
                    <a href="/contact" class="nav-link">CONTACT</a>
                    <button class="theme-toggle desktop-theme-toggle" id="theme-toggle-desktop">LIGHT</button>
                </div>
            </div>
        </div>
    </nav>
    <main class="main-content">
        <section class="section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title glitch-text" data-text="CONTACT">CONTACT</h2>
                </div>
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="terminal-window contact-terminal">
                            <div class="terminal-header">
                                <span class="terminal-button red"></span>
                                <span class="terminal-button yellow"></span>
                                <span class="terminal-button green"></span>
                                <span class="terminal-title">contact@calculate</span>
                            </div>
                            <div class="terminal-body">
                                <div class="contact-grid">
                                    <div class="contact-method">
                                        <i class="fas fa-envelope"></i>
                                        <div>
                                            <h4>Email</h4>
                                            <a href="mailto:{{ data.contact.email }}">{{ data.contact.email }}</a>
                                        </div>
                                    </div>
                                    <div class="contact-method">
                                        <i class="fas fa-phone"></i>
                                        <div>
                                            <h4>Phone</h4>
                                            <a href="tel:{{ data.contact.phone }}">{{ data.contact.phone }}</a>
                                        </div>
                                    </div>
                                    <div class="contact-method">
                                        <i class="fab fa-linkedin"></i>
                                        <div>
                                            <h4>LinkedIn</h4>
                                            <a href="{{ data.contact.linkedin }}" target="_blank">View Profile</a>
                                        </div>
                                    </div>
                                    <div class="contact-method">
                                        <i class="fab fa-github"></i>
                                        <div>
                                            <h4>GitHub</h4>
                                            <a href="{{ data.contact.github }}" target="_blank">View Repositories</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/matrix.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
